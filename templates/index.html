<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI-Powered Song Remix Generator</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
</head>
<body>
  <div class="container py-5">
    <h1 class="text-center mb-4">Song Remix Generator</h1>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="alert alert-warning">
          {% for message in messages %}
            <div>{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    <div class="card mx-auto" style="max-width: 500px;">
      <div class="card-body">
        <form method="POST" enctype="multipart/form-data">
          <div class="mb-3">
            <label for="file" class="form-label">Upload an MP3 file</label>
            <input class="form-control" type="file" id="file" name="file" accept=".mp3" required />
          </div>
          <div class="mb-3">
            <label for="style" class="form-label">Select Remix Style</label>
            <select class="form-select" id="style" name="style" required>
              <option value="" disabled selected>Select a style</option>
              <option value="lofi">Lofi Beat</option>
              <option value="jazz">Jazz Version</option>
              <option value="dubstep">Dubstep Drop</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary w-100">Generate Remix</button>
        </form>
      </div>
    </div>
  </div>
  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
